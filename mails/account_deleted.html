<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="utf-8">
        <style>
            body {
                background-color: #181a1b;
                margin: 0;
                padding: 40px;
                font-family: sans-serif;
                min-height: 100vh;
            }

            p, h1 {
                color: white;
                text-align: center;
            }

            a {
                color: #9ccfba;
                text-decoration: none;
            }

            .container {
                max-width: 600px;
                margin: 0 auto;
                background-color: #1c1e1f;
                padding: 20px;
                border-radius: 8px;
                text-align: center;
            }

            .button {
                background-color: #9ccfba;
                color: #000000;
                padding: 10px 20px;
                text-decoration: none;
                border-radius: 5px;
                font-weight: bold;
                display: inline-block;
                margin-top: 20px;
            }

            .footer {
                font-size: 12px;
                margin-top: 30px;
                text-align: center;
                color: #aaa;
            }

            .footer a {
                color: #9ccfba;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Your davidnet account is deleted!</h1>
            <p style="color: red">
                ):
            </p>
            <a
                href="https://account.davidnet.net/signup"
                class="button"
            >Create new account</a>
            <br>
            <br>
            <br>
            <div class="footer">
                <p>
                    <a href="https://davidnet.net/legal/terms_of_service/"
                    >Terms of Service</a> | <a
                        href="https://davidnet.net/legal/privacy_policy/"
                    >Privacy Policy</a> | <a href="https://docs.davidnet.net"
                    >Documentation</a>
                </p>
                <p>
                    For any questions, please reach us at <a
                        href="mailto:contact@davidnet.net"
                    >contact@davidnet.net</a>.
                </p>
                <br>
                <p>Do not reply to this email.</p>
            </div>
        </div>
    </body>
</html>
